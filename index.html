        currentProblem = { type: 'simul', ansX: x, ansY: y };
        
        document.getElementById('equation-display').innerHTML = `<div class="equation">${eq1.rawStr}</div><div class="equation">${eq2.rawStr}</div>`;
        
        let mult1 = Math.abs(eq2.B); let mult2 = Math.abs(eq1.B);
        let nA1 = eq1.A * mult1, nB1 = eq1.B * mult1, nC1 = eq1.C * mult1;
        let nA2 = eq2.A * mult2, nB2 = eq2.B * mult2, nC2 = eq2.C * mult2;
        let action = (nB1 === nB2) ? 'Subtracting' : 'Adding';
        let xCoeff = (nB1 === nB2) ? (nA1 - nA2) : (nA1 + nA2);
        let constant = (nB1 === nB2) ? (nC1 - nC2) : (nC1 + nC2);

        document.getElementById('solution-steps').innerHTML = `
            <div class="step"><b>Phase 1: Simplify to Standard Form</b><br>
                ${eq1.stepHtml}<br>${eq2.stepHtml}<br>
                System: <span class="step-math">${eq1.stdStr}</span><span class="step-math">${eq2.stdStr}</span>
            </div>
            <div class="step"><b>Phase 2: Elimination</b><br>
                Multiply first eq by ${mult1} and second eq by ${mult2}:
                <span class="step-math">${formatPolynomial([{coeff: nA1, var: 'x'}, {coeff: nB1, var: 'y'}])} = ${nC1}</span>
                <span class="step-math">${formatPolynomial([{coeff: nA2, var: 'x'}, {coeff: nB2, var: 'y'}])} = ${nC2}</span>
                ${action} to eliminate <i>y</i>:
                <span class="step-math">${xCoeff}<i>x</i> = ${constant} &nbsp; ⇒ &nbsp; <span style="color: var(--success);"><i>x</i> = ${x}</span></span>
                Substitute <i>x</i> back:
                <span class="step-math">${formatPolynomial([{coeff: eq1.B, var: 'y'}])} = ${eq1.C - (eq1.A * x)} &nbsp; ⇒ &nbsp; <span style="color: var(--success);"><i>y</i> = ${y}</span></span>
            </div>
        `;
    }

    function generateSimulIntermediate() {
        let x, y, a1, b1, dx1, dy1, a2, b2, dx2, dy2;
        while (true) {
            x = getRandomInt(-8, 8); y = getRandomInt(-8, 8);
            a1 = getRandomInt(-5, 5, true); b1 = getRandomInt(-5, 5, true);
            dx1 = getRandomInt(1, 4); dy1 = getRandomInt(1, 4);
            if (dx1 === 1 && dy1 === 1) dx1 = getRandomInt(2, 4);
            a2 = getRandomInt(-5, 5, true); b2 = getRandomInt(-5, 5, true);
            dx2 = getRandomInt(1, 4); dy2 = getRandomInt(1, 4);
            if (dx2 === 1 && dy2 === 1) dy2 = getRandomInt(2, 4);
            if ((a1 * dy1 * b2 * dx2) - (a2 * dy2 * b1 * dx1) !== 0) break;
        }

        let [Cnum1, Cden1] = simplifyFraction((a1 * x * dy1) + (b1 * y * dx1), dx1 * dy1);
        let [Cnum2, Cden2] = simplifyFraction((a2 * x * dy2) + (b2 * y * dx2), dx2 * dy2);
        
        currentProblem = { type: 'simul', ansX: x, ansY: y };
        document.getElementById('equation-display').innerHTML = `<div class="equation">${formatFractionEq(a1, dx1, b1, dy1, Cnum1, Cden1)}</div><div class="equation">${formatFractionEq(a2, dx2, b2, dy2, Cnum2, Cden2)}</div>`;

        let L1 = lcm3(dx1, dy1, Cden1); let A1 = a1 * (L1 / dx1); let B1 = b1 * (L1 / dy1); let K1 = Cnum1 * (L1 / Cden1);
        let L2 = lcm3(dx2, dy2, Cden2); let A2 = a2 * (L2 / dx2); let B2 = b2 * (L2 / dy2); let K2 = Cnum2 * (L2 / Cden2);

        let mult1 = Math.abs(B2); let mult2 = Math.abs(B1);
        let nA1 = A1 * mult1, nB1 = B1 * mult1, nK1 = K1 * mult1;
        let nA2 = A2 * mult2, nB2 = B2 * mult2, nK2 = K2 * mult2;

        let action = (nB1 === nB2) ? 'Subtracting' : 'Adding';
        let xCoeff = (nB1 === nB2) ? (nA1 - nA2) : (nA1 + nA2);
        let constant = (nB1 === nB2) ? (nK1 - nK2) : (nK1 + nK2);

        document.getElementById('solution-steps').innerHTML = `
            <div class="step"><b>Phase 1: Clear Fractions</b><br>
                LCM for first equation is ${L1}. Multiply by ${L1}:<br>
                <span class="step-math">${formatPolynomial([{coeff: A1, var: 'x'}, {coeff: B1, var: 'y'}])} = ${K1}</span>
                LCM for second equation is ${L2}. Multiply by ${L2}:<br>
                <span class="step-math">${formatPolynomial([{coeff: A2, var: 'x'}, {coeff: B2, var: 'y'}])} = ${K2}</span>
            </div>
            <div class="step"><b>Phase 2: Elimination</b><br>
                Multiply the first equation by ${mult1} and second by ${mult2}:
                <span class="step-math">${formatPolynomial([{coeff: nA1, var: 'x'}, {coeff: nB1, var: 'y'}])} = ${nK1}</span>
                <span class="step-math">${formatPolynomial([{coeff: nA2, var: 'x'}, {coeff: nB2, var: 'y'}])} = ${nK2}</span>
                ${action} equations:
                <span class="step-math">${xCoeff}<i>x</i> = ${constant} &nbsp; ⇒ &nbsp; <span style="color: var(--success);"><i>x</i> = ${x}</span></span>
                Substitute <i>x</i> back:
                <span class="step-math">${formatPolynomial([{coeff: B1, var: 'y'}])} = ${K1 - A1*x} &nbsp; ⇒ &nbsp; <span style="color: var(--success);"><i>y</i> = ${y}</span></span>
            </div>
        `;
    }

    function generateSimulAdvanced() {
        let x, y, U, V, m, n, p, q, a1, b1, a2, b2;
        while(true) {
            U = getRandomInt(2, 5) * (Math.random() < 0.5 ? 1 : -1); V = getRandomInt(2, 5) * (Math.random() < 0.5 ? 1 : -1);
            x = getRandomInt(-5, 5); y = getRandomInt(-5, 5);
            m = getRandomInt(1, 3); n = getRandomInt(1, 3);
            p = U - (m * x); q = V - (n * y);
            a1 = getRandomInt(-4, 4, true); b1 = getRandomInt(-4, 4, true);
            a2 = getRandomInt(-4, 4, true); b2 = getRandomInt(-4, 4, true);
            if ((a1 * b2) - (a2 * b1) !== 0) break;
        }

        let A1 = a1 * U; let B1 = b1 * V; let C1 = a1 + b1;
        let A2 = a2 * U; let B2 = b2 * V; let C2 = a2 + b2;

        currentProblem = { type: 'simul', ansX: x, ansY: y };
        let eq1Left = `${buildFraction(A1, formatLinearBinomial(m, 'x', p))} ${B1 < 0 ? '-' : '+'} ${buildFraction(Math.abs(B1), formatLinearBinomial(n, 'y', q))}`;
        let eq2Left = `${buildFraction(A2, formatLinearBinomial(m, 'x', p))} ${B2 < 0 ? '-' : '+'} ${buildFraction(Math.abs(B2), formatLinearBinomial(n, 'y', q))}`;

        document.getElementById('equation-display').innerHTML = `<div class="equation">${eq1Left} = ${C1}</div><div class="equation">${eq2Left} = ${C2}</div>`;

        let mult1 = Math.abs(b2); let mult2 = Math.abs(b1);
        let nA1 = A1 * mult1, nB1 = B1 * mult1; let nA2 = A2 * mult2, nB2 = B2 * mult2;
        let action = (nB1 === nB2) ? 'Subtracting' : 'Adding';
        let aCoeff = (nB1 === nB2) ? (nA1 - nA2) : (nA1 + nA2);
        let constant = (nB1 === nB2) ? (C1*mult1 - C2*mult2) : (C1*mult1 + C2*mult2);
        let simpA = simplifyFraction(constant, aCoeff); 
        let simpB = simplifyFraction(C1 - (A1 * (1/U)), B1); 

        document.getElementById('solution-steps').innerHTML = `
            <div class="step"><b>Phase 1: Substitution</b><br>
                <span class="step-math">Let <i>a</i> = ${buildFraction('1', formatLinearBinomial(m, 'x', p))} and <i>b</i> = ${buildFraction('1', formatLinearBinomial(n, 'y', q))}</span>
                <span class="step-math">${formatPolynomial([{coeff: A1, var: 'a'}, {coeff: B1, var: 'b'}])} = ${C1}</span>
                <span class="step-math">${formatPolynomial([{coeff: A2, var: 'a'}, {coeff: B2, var: 'b'}])} = ${C2}</span>
            </div>
            <div class="step"><b>Phase 2: Solve for <i>a</i> and <i>b</i></b><br>
                Multiply equations by ${mult1} and ${mult2}, then ${action}:
                <span class="step-math">${aCoeff}<i>a</i> = ${constant} &nbsp; ⇒ &nbsp; <i>a</i> = ${buildFraction(simpA[0], simpA[1])}</span>
                Sub <i>a</i> back to yield <i>b</i> = ${buildFraction(simpB[0], simpB[1])}
            </div>
            <div class="step"><b>Phase 3: Back-Substitution</b><br>
                <span class="step-math"><i>a</i> = ${buildFraction(simpA[0], simpA[1])} &nbsp; ⇒ &nbsp; ${formatLinearBinomial(m, 'x', p)} = ${simpA[1] / simpA[0]} &nbsp; ⇒ &nbsp; <span style="color: var(--success);"><i>x</i> = ${x}</span></span>
                <span class="step-math"><i>b</i> = ${buildFraction(simpB[0], simpB[1])} &nbsp; ⇒ &nbsp; ${formatLinearBinomial(n, 'y', q)} = ${simpB[1] / simpB[0]} &nbsp; ⇒ &nbsp; <span style="color: var(--success);"><i>y</i> = ${y}</span></span>
            </div>
        `;
    }

    function generateSimulMastery() {
        let x, y, m1, n1, m2, n2, U, V, a1, b1, a2, b2, A1, B1, C1, A2, B2, C2;
        while (true) {
            x = getRandomInt(-4, 4); y = getRandomInt(-4, 4);
            if (x === 0 && y === 0) continue;
            m1 = getRandomInt(-3, 3, true); n1 = getRandomInt(-3, 3, true);
            m2 = getRandomInt(-3, 3, true); n2 = getRandomInt(-3, 3, true);
            if ((m1 * n2) - (m2 * n1) === 0) continue;
            U = m1 * x + n1 * y; V = m2 * x + n2 * y;
            if (U === 0 || V === 0) continue;
            a1 = getRandomInt(-4, 4, true); b1 = getRandomInt(-4, 4, true);
            a2 = getRandomInt(-4, 4, true); b2 = getRandomInt(-4, 4, true);
            if ((a1 * b2) - (a2 * b1) === 0) continue;
            A1 = a1 * U; B1 = b1 * V; C1 = a1 + b1; A2 = a2 * U; B2 = b2 * V; C2 = a2 + b2; break;
        }

        currentProblem = { type: 'simul', ansX: x, ansY: y };
        let den1 = formatPolynomial([{coeff: m1, var: 'x'}, {coeff: n1, var: 'y'}]);
        let den2 = formatPolynomial([{coeff: m2, var: 'x'}, {coeff: n2, var: 'y'}]);

        document.getElementById('equation-display').innerHTML = `<div class="equation">${buildFraction(A1, den1)} ${B1 < 0 ? '-' : '+'} ${buildFraction(Math.abs(B1), den2)} = ${C1}</div><div class="equation">${buildFraction(A2, den1)} ${B2 < 0 ? '-' : '+'} ${buildFraction(Math.abs(B2), den2)} = ${C2}</div>`;

        let mult1 = Math.abs(b2); let mult2 = Math.abs(b1);
        let aCoeff = ((A1*mult1) - (A2*mult2)) || ((A1*mult1) + (A2*mult2));
        let constant1 = (B1*mult1 === B2*mult2 || B1*mult1 === -B2*mult2) ? ((C1*mult1)-(C2*mult2)) : ((C1*mult1)+(C2*mult2)); 
        if (aCoeff === 0) { aCoeff = ((A1*mult1) + (A2*mult2)); constant1 = ((C1*mult1)+(C2*mult2)); }

        let simpA = simplifyFraction(1, 1/U); let simpB = simplifyFraction(1, 1/V); 
        let mult3 = Math.abs(n2); let mult4 = Math.abs(n1);
        let xCoeff = (n1*mult3 === n2*mult4 || n1*mult3 === -n2*mult4) ? (m1*mult3 - m2*mult4) : (m1*mult3 + m2*mult4);

        document.getElementById('solution-steps').innerHTML = `
            <div class="step"><b>Phase 1 & 2: Substitute and Solve</b><br>
                <span class="step-math">Let <i>a</i> = ${buildFraction('1', den1)}, <i>b</i> = ${buildFraction('1', den2)}</span>
                <span class="step-math">Solving gives: <i>a</i> = ${buildFraction(simpA[0], simpA[1])}, <i>b</i> = ${buildFraction(simpB[0], simpB[1])}</span>
            </div>
            <div class="step"><b>Phase 3: Back-Substitution (New System)</b><br>
                <span class="step-math">${den1} = ${U}</span>
                <span class="step-math">${den2} = ${V}</span>
            </div>
            <div class="step"><b>Phase 4: Solve new system for <i>x</i> and <i>y</i></b><br>
                Multiply equations by ${mult3} and ${mult4}, then eliminate <i>y</i>:
                <span class="step-math">${xCoeff}<i>x</i> = ${xCoeff*x} &nbsp; ⇒ &nbsp; <span style="color: var(--success);"><i>x</i> = ${x}</span></span>
                Substitute <i>x</i> back to get: <span class="step-math" style="color: var(--success);"><i>y</i> = ${y}</span>
            </div>
        `;
    }

    // ==========================================
    // MODULE: Quadratic Equations
    // ==========================================

    function formatQuadSteps(A, B, C, x1, x2) {
        if (C === 0) {
            return `
                <div class="step">Factor out <i>x</i> from the terms:
                    <span class="step-math"><i>x</i>(${formatLinearBinomial(A, 'x', B)}) = 0</span>
                </div>
                <div class="step">Set each factor to zero to solve for <i>x</i>:
                    <span class="step-math" style="color: var(--success);"><i>x</i> = 0, &nbsp; <i>x</i> = ${parseFloat((-B/A).toFixed(2))}</span>
                </div>
            `;
        }
        
        if (B === 0) {
            let val = -C/A; let root = Math.sqrt(val);
            return `
                <div class="step">Isolate the <i>x<sup>2</sup></i> term:
                    <span class="step-math">${A === 1 ? '' : A}<i>x<sup>2</sup></i> = ${-C}</span>
                </div>
                <div class="step">Take the square root of both sides (remember the &plusmn; sign):
                    <span class="step-math" style="color: var(--success);"><i>x</i> = ${parseFloat(root.toFixed(2))}, &nbsp; <i>x</i> = ${parseFloat((-root).toFixed(2))}</span>
                </div>
            `;
        }

        let AC = A * C; let m = 0, n = 0;
        for (let i = -Math.abs(AC); i <= Math.abs(AC); i++) {
            if (i === 0) continue;
            if (AC % i === 0) { let j = AC / i; if (i + j === B) { m = i; n = j; break; } }
        }
        
        if (A === 1) {
            return `
                <div class="step">Find two numbers that multiply to ${C} and add to ${B}. These are ${m} and ${n}.</div>
                <div class="step">Rewrite the equation in factored form:
                    <span class="step-math">(<i>x</i> ${m < 0 ? '-' : '+'} ${Math.abs(m)})(<i>x</i> ${n < 0 ? '-' : '+'} ${Math.abs(n)}) = 0</span>
                </div>
                <div class="step">Set each factor to zero to solve for <i>x</i>:
                    <span class="step-math" style="color: var(--success);"><i>x</i> = ${-m}, &nbsp; <i>x</i> = ${-n}</span>
                </div>
            `;
        } else {
            let p = gcd(A, Math.abs(m)); let q = A / p; let r = m / p;
            let s = n < 0 ? -gcd(Math.abs(n), Math.abs(C)) : gcd(Math.abs(n), Math.abs(C));
            return `
                <div class="step">Multiply <i>a</i> (${A}) and <i>c</i> (${C}): ${A} × ${C} = ${AC}.</div>
                <div class="step">Find two numbers that multiply to ${AC} and add to the middle term (${B}). These are ${m} and ${n}.</div>
                <div class="step">Split the middle term:
                    <span class="step-math">${A}<i>x<sup>2</sup></i> ${m < 0 ? '-' : '+'} ${Math.abs(m)}<i>x</i> ${n < 0 ? '-' : '+'} ${Math.abs(n)}<i>x</i> ${C < 0 ? '-' : '+'} ${Math.abs(C)} = 0</span>
                </div>
                <div class="step">Factor by grouping:
                    <span class="step-math">(${formatLinearBinomial(p, 'x', s)})(${formatLinearBinomial(q, 'x', r)}) = 0</span>
                </div>
                <div class="step">Set each factor to zero:
                    <span class="step-math" style="color: var(--success);"><i>x</i> = ${parseFloat(x1.toFixed(2))}, &nbsp; <i>x</i> = ${parseFloat(x2.toFixed(2))}</span>
                </div>
            `;
        }
    }

    function generateQuadStandard() {
        let type = getRandomInt(0, 2);
        let A = 1, B = 0, C = 0, x1 = 0, x2 = 0; let eqStr = "";
        
        if (type === 0) { 
            x1 = getRandomInt(1, 10); x2 = -x1; C = -x1*x1; B = 0;
            eqStr = [`${formatPolynomial([{coeff:1, var:'x<sup>2</sup>'}, {coeff:C, var:''}])} = 0`, `<i>x<sup>2</sup></i> = ${-C}`][getRandomInt(0,1)];
        } else if (type === 1) { 
            x1 = 0; x2 = getRandomInt(-10, 10, true); B = -x2; C = 0;
            eqStr = [`${formatPolynomial([{coeff:1, var:'x<sup>2</sup>'}, {coeff:B, var:'x'}])} = 0`, `<i>x<sup>2</sup></i> = ${-B < 0 ? '-' : ''}${Math.abs(B)}<i>x</i>`][getRandomInt(0,1)];
        } else { 
            x1 = getRandomInt(-8, 8, true); x2 = getRandomInt(-8, 8, true); if (x1 === x2) x2++;
            B = -(x1+x2); C = x1*x2;
            eqStr = [
                `${formatPolynomial([{coeff:1, var:'x<sup>2</sup>'}, {coeff:B, var:'x'}])} = ${-C}`,
                `<i>x<sup>2</sup></i> = ${formatPolynomial([{coeff:-B, var:'x'}, {coeff:-C, var:''}])}`,
                `${formatPolynomial([{coeff:1, var:'x<sup>2</sup>'}])} = ${formatPolynomial([{coeff:-B, var:'x'}, {coeff:-C, var:''}])}`
            ][getRandomInt(0, 2)];
        }

        currentProblem = { type: 'quad', ansX1: x1, ansX2: x2 };
        document.getElementById('equation-display').innerHTML = `<div class="equation">${eqStr}</div>`;
        
        let preStep = "";
        if (eqStr.indexOf('= 0') === -1 && C !== 0 && B !== 0) {
            preStep = `<div class="step">Bring all terms to the LHS to form the standard quadratic equation:<span class="step-math">${formatPolynomial([{coeff:A, var:'x<sup>2</sup>'}, {coeff:B, var:'x'}, {coeff:C, var:''}])} = 0</span></div>`;
        } else if (eqStr.indexOf('= 0') === -1 && C === 0) {
             preStep = `<div class="step">Bring all terms to the LHS:<span class="step-math">${formatPolynomial([{coeff:A, var:'x<sup>2</sup>'}, {coeff:B, var:'x'}])} = 0</span></div>`;
        }
        
        document.getElementById('solution-steps').innerHTML = preStep + formatQuadSteps(1, B, C, x1, x2);
    }

    function generateQuadBrackets() {
        let type = getRandomInt(0, 2);
        let stepsHTML = "";
        
        if (type === 0) {
            let x1 = getRandomInt(-8, 8); let x2 = getRandomInt(-8, 8);
            while (x1 === x2) x2 = getRandomInt(-8, 8);
            let S = x1 + x2; let P = x1 * x2;
            let A = getRandomInt(-5, 5, true); let B = -S - A; let K = A * B - P;
            currentProblem = { type: 'quad', ansX1: x1, ansX2: x2 };
            let p1 = formatLinearBinomial(1, 'x', A); let p2 = formatLinearBinomial(1, 'x', B);
            document.getElementById('equation-display').innerHTML = `<div class="equation">(${p1})(${p2}) = ${K}</div>`;
            
            let B_std = -(x1 + x2); let C_std = x1 * x2;
            stepsHTML = `
                <div class="step">Expand the brackets:
                    <span class="step-math"><i>x<sup>2</sup></i> ${B < 0 ? '-' : '+'} ${Math.abs(B)}<i>x</i> ${A < 0 ? '-' : '+'} ${Math.abs(A)}<i>x</i> ${A*B < 0 ? '-' : '+'} ${Math.abs(A*B)} = ${K}</span>
                </div>
                <div class="step">Combine terms and shift constant to LHS to form standard quadratic equation:
                    <span class="step-math">${formatPolynomial([{coeff: 1, var: 'x<sup>2</sup>'}, {coeff: B_std, var: 'x'}, {coeff: C_std, var: ''}])} = 0</span>
                </div>
                ${formatQuadSteps(1, B_std, C_std, x1, x2)}
            `;
        } else if (type === 1) {
            let q = getRandomInt(1, 3); let p = getRandomInt(-3, 3, true);
            let v = getRandomInt(1, 3); let u = getRandomInt(-3, 3, true);
            let a = q*v; let b = -(q*u + p*v); let c = p*u;
            if (b === 0) b = 1; 
            
            let M = gcd(Math.abs(a), Math.abs(b));
            let N = a/M; let P = b/M; let K = -c;
            
            let x1 = p/q; let x2 = u/v;
            currentProblem = { type: 'quad', ansX1: x1, ansX2: x2 };
            
            let bracket = formatLinearBinomial(N, 'x', P);
            document.getElementById('equation-display').innerHTML = `<div class="equation">${M === 1 ? '' : M}<i>x</i>(${bracket}) = ${K}</div>`;
            
            stepsHTML = `
                <div class="step">Distribute the term outside the bracket:
                    <span class="step-math">${formatPolynomial([{coeff: a, var: 'x<sup>2</sup>'}, {coeff: b, var: 'x'}])} = ${K}</span>
                </div>
                <div class="step">Bring constant to the LHS to form standard quadratic equation:
                    <span class="step-math">${formatPolynomial([{coeff: a, var: 'x<sup>2</sup>'}, {coeff: b, var: 'x'}, {coeff: c, var: ''}])} = 0</span>
                </div>
                ${formatQuadSteps(a, b, c, x1, x2)}
            `;
        } else {
            let A = getRandomInt(1, 3); let B = getRandomInt(-5, 5, true);
            let R = getRandomInt(1, 6); let K = R*R;
            let x1 = (-B + R) / A; let x2 = (-B - R) / A;
            
            currentProblem = { type: 'quad', ansX1: x1, ansX2: x2 };
            let bracket = formatLinearBinomial(A, 'x', B);
            let eqStr = `(${bracket})<sup>2</sup> ${Math.random() < 0.5 ? `= ${K}` : `- ${K} = 0`}`;
            document.getElementById('equation-display').innerHTML = `<div class="equation">${eqStr}</div>`;
            
            let preStep = eqStr.indexOf('= 0') !== -1 ? `<div class="step">Shift the constant to the RHS to isolate the squared bracket:<span class="step-math">(${bracket})<sup>2</sup> = ${K}</span></div>` : "";

            stepsHTML = preStep + `
                <div class="step">Take the square root of both sides:
                    <span class="step-math">${bracket} = &plusmn;&radic;${K}</span>
                    <span class="step-math">${bracket} = &plusmn;${R}</span>
                </div>
                <div class="step">Solve the two resulting linear equations:
                    <span class="step-math" style="color: var(--success);"><i>x</i> = ${parseFloat(x1.toFixed(2))}, &nbsp; <i>x</i> = ${parseFloat(x2.toFixed(2))}</span>
                </div>
            `;
        }
        document.getElementById('solution-steps').innerHTML = stepsHTML;
    }

    function generateQuadIntermediate() {
        let type = getRandomInt(0, 2);
        let stepsHTML = "";
        
        if (type === 2) {
            let x1, x2, B, C;
            while(true) {
                x1 = getRandomInt(-8, 8, true); x2 = getRandomInt(-8, 8, true);
                B = -(x1 + x2); C = x1 * x2;
                if (C !== 0 && Math.abs(B) < 20 && Math.abs(C) < 40 && x1 !== x2) break;
            }
            currentProblem = { type: 'quad', ansX1: x1, ansX2: x2 };
            let eqStr = `<i>x</i> ${C < 0 ? '-' : '+'} ${buildFraction(Math.abs(C), '<i>x</i>')} = ${-B}`;
            document.getElementById('equation-display').innerHTML = `<div class="equation">${eqStr}</div>`;
            
            stepsHTML = `
                <div class="step">Multiply the entire equation by <i>x</i> to clear the fraction:
                    <span class="step-math"><i>x</i>(<i>x</i>) ${C < 0 ? '-' : '+'} <i>x</i>(${buildFraction(Math.abs(C), '<i>x</i>')}) = <i>x</i>(${-B})</span>
                    <span class="step-math"><i>x<sup>2</sup></i> ${C < 0 ? '-' : '+'} ${Math.abs(C)} = ${-B === 1 ? '' : (-B === -1 ? '-' : -B)}<i>x</i></span>
                </div>
                <div class="step">Rearrange to standard form:
                    <span class="step-math">${formatPolynomial([{coeff: 1, var: 'x<sup>2</sup>'}, {coeff: B, var: 'x'}, {coeff: C, var: ''}])} = 0</span>
                </div>
                ${formatQuadSteps(1, B, C, x1, x2)}
            `;
            document.getElementById('solution-steps').innerHTML = stepsHTML;
            return;
        }
        
        let q = getRandomInt(1, 3); let p = getRandomInt(-5, 5, true);
        while(gcd(Math.abs(p), q) !== 1) p = getRandomInt(-5, 5, true);
        let v = getRandomInt(1, 3); let u = getRandomInt(-5, 5, true);
        while(gcd(Math.abs(u), v) !== 1) u = getRandomInt(-5, 5, true);

        let A = q * v; let B = -(q * u + p * v); let C = p * u;
        if (B === 0 || C === 0) return generateQuadIntermediate(); 
        
        let x1 = p/q; let x2 = u/v;
        currentProblem = { type: 'quad', ansX1: x1, ansX2: x2 };

        if (type === 0) { 
            let A2 = getRandomInt(-2, 2); let A1 = A + A2;
            let B2 = getRandomInt(-3, 3); let B1 = B + B2;
            let C2 = getRandomInt(-5, 5); let C1 = C + C2;
            
            let lhs = formatPolynomial([{coeff: A1, var: 'x<sup>2</sup>'}, {coeff: B1, var: 'x'}, {coeff: C1, var: ''}]);
            let rhs = formatPolynomial([{coeff: A2, var: 'x<sup>2</sup>'}, {coeff: B2, var: 'x'}, {coeff: C2, var: ''}]);
            if (rhs === "0") rhs = "0";
            
            document.getElementById('equation-display').innerHTML = `<div class="equation">${lhs} = ${rhs}</div>`;
            
            stepsHTML = `
                <div class="step">Bring all terms to the LHS to form standard quadratic equation:
                    <span class="step-math">${formatPolynomial([{coeff: A, var: 'x<sup>2</sup>'}, {coeff: B, var: 'x'}, {coeff: C, var: ''}])} = 0</span>
                </div>
                ${formatQuadSteps(A, B, C, x1, x2)}
            `;
        } else { 
            let D = getRandomInt(2, 6);
            let N2 = getRandomInt(-5, 5); let N1 = C * D + N2; 
            let A2 = getRandomInt(-2, 2); let A1 = A + A2;
            let B2 = getRandomInt(-3, 3); let B1 = B + B2;
            
            let lhsQuad = formatPolynomial([{coeff: A1, var: 'x<sup>2</sup>'}, {coeff: B1, var: 'x'}]);
            let rhsQuad = formatPolynomial([{coeff: A2, var: 'x<sup>2</sup>'}, {coeff: B2, var: 'x'}]);
            
            let lhs = lhsQuad === "0" ? buildFraction(N1 < 0 ? `-${Math.abs(N1)}` : N1, D) : `${lhsQuad} ${N1 < 0 ? '-' : '+'} ${buildFraction(Math.abs(N1), D)}`;
            let rhs = rhsQuad === "0" ? buildFraction(N2 < 0 ? `-${Math.abs(N2)}` : N2, D) : `${rhsQuad} ${N2 < 0 ? '-' : '+'} ${buildFraction(Math.abs(N2), D)}`;
            
            document.getElementById('equation-display').innerHTML = `<div class="equation">${lhs} = ${rhs}</div>`;
            
            stepsHTML = `
                <div class="step">Bring all terms to the LHS:
                    <span class="step-math">${formatPolynomial([{coeff: A, var: 'x<sup>2</sup>'}, {coeff: B, var: 'x'}])} ${N1-N2 < 0 ? '-' : '+'} ${buildFraction(Math.abs(N1-N2), D)} = 0</span>
                </div>
                <div class="step">Simplify the fraction:
                    <span class="step-math">${formatPolynomial([{coeff: A, var: 'x<sup>2</sup>'}, {coeff: B, var: 'x'}, {coeff: C, var: ''}])} = 0</span>
                </div>
                ${formatQuadSteps(A, B, C, x1, x2)}
            `;
        }
        document.getElementById('solution-steps').innerHTML = stepsHTML;
    }

    function generateQuadMastery() {
        let type = getRandomInt(0, 3);
        let stepsHTML = "";
        
        if (type === 0) {
            let a, b, c, d, r1, r2, B, C;
            let valid = false;

            while (!valid) {
                r1 = getRandomInt(-6, 6); r2 = getRandomInt(-6, 6);
                if (r1 === r2) continue;
                B = -(r1 + r2); C = r1 * r2;
                b = getRandomInt(-5, 5);
                if (b === -r1 || b === -r2) continue;
                
                let num = b * B - b * b - C;
                d = getRandomInt(-8, 8);
                if (d === b || d === -r1 || d === -r2 || d === 0) continue;
                
                if (num % (d - b) === 0) {
                    a = num / (d - b); c = b + d - B - a;
                    if (a !== 0 && c !== 0) valid = true;
                }
            }
            
            currentProblem = { type: 'quad', ansX1: r1, ansX2: r2 };
            let frac1 = buildFraction(a, formatLinearBinomial(1, 'x', b));
            let frac2 = buildFraction(Math.abs(c), formatLinearBinomial(1, 'x', d));
            let sign = c < 0 ? '-' : '+';
            
            document.getElementById('equation-display').innerHTML = `<div class="equation">${frac1} ${sign} ${frac2} = 1</div>`;

            stepsHTML = `
                <div class="step">Multiply entire equation by LCM (${formatLinearBinomial(1, 'x', b)})(${formatLinearBinomial(1, 'x', d)}) to clear fractions:
                    <span class="step-math">${a}(${formatLinearBinomial(1, 'x', d)}) ${sign} ${Math.abs(c)}(${formatLinearBinomial(1, 'x', b)}) = (${formatLinearBinomial(1, 'x', b)})(${formatLinearBinomial(1, 'x', d)})</span>
                </div>
                <div class="step">Expand brackets on both sides:
                    <span class="step-math">${formatPolynomial([{coeff: a+c, var: 'x'}, {coeff: a*d+c*b, var: ''}])} = <i>x<sup>2</sup></i> ${b+d < 0 ? '-' : '+'} ${Math.abs(b+d)}<i>x</i> ${b*d < 0 ? '-' : '+'} ${Math.abs(b*d)}</span>
                </div>
                <div class="step">Bring all terms to one side to form standard quadratic equation:
                    <span class="step-math"><i>x<sup>2</sup></i> ${B < 0 ? '-' : '+'} ${Math.abs(B)}<i>x</i> ${C < 0 ? '-' : '+'} ${Math.abs(C)} = 0</span>
                </div>
                ${formatQuadSteps(1, B, C, r1, r2)}
            `;
        } else if (type === 1) {
            let r1, r2, B, D, A, C;
            while(true) {
                r1 = getRandomInt(-5, 5); r2 = getRandomInt(-5, 5);
                if (r1 === r2) continue;
                B = getRandomInt(-5, 5, true); D = getRandomInt(-5, 5, true);
                if (B === D || B === -r1 || B === -r2 || D === -r1 || D === -r2) continue;
                let S = r1 + r2 + 2*B + 2*D;
                let V = -r1*r2 + 3*B*D;
                if ((V - B*S) % (D - B) === 0) {
                    A = (V - B*S) / (D - B);
                    C = S - A;
                    if (A !== B && C !== D) break; 
                }
            }
            currentProblem = { type: 'quad', ansX1: r1, ansX2: r2 };
            
            let frac1 = buildFraction(formatLinearBinomial(1, 'x', A), formatLinearBinomial(1, 'x', B));
            let frac2 = buildFraction(formatLinearBinomial(1, 'x', C), formatLinearBinomial(1, 'x', D));
            
            document.getElementById('equation-display').innerHTML = `<div class="equation">${frac1} + ${frac2} = 3</div>`;
            
            stepsHTML = `
                <div class="step">Multiply the entire equation by the LCM (${formatLinearBinomial(1, 'x', B)})(${formatLinearBinomial(1, 'x', D)}) to clear fractions:
                    <span class="step-math">(${formatLinearBinomial(1, 'x', A)})(${formatLinearBinomial(1, 'x', D)}) + (${formatLinearBinomial(1, 'x', C)})(${formatLinearBinomial(1, 'x', B)}) = 3(${formatLinearBinomial(1, 'x', B)})(${formatLinearBinomial(1, 'x', D)})</span>
                </div>
                <div class="step">Expand the brackets on both sides:
                    <span class="step-math">(<i>x<sup>2</sup></i> ${A+D < 0 ? '-' : '+'} ${Math.abs(A+D)}<i>x</i> ${A*D < 0 ? '-' : '+'} ${Math.abs(A*D)}) + (<i>x<sup>2</sup></i> ${B+C < 0 ? '-' : '+'} ${Math.abs(B+C)}<i>x</i> ${B*C < 0 ? '-' : '+'} ${Math.abs(B*C)}) = 3(<i>x<sup>2</sup></i> ${B+D < 0 ? '-' : '+'} ${Math.abs(B+D)}<i>x</i> ${B*D < 0 ? '-' : '+'} ${Math.abs(B*D)})</span>
                </div>
                <div class="step">Combine terms and shift to one side to form standard quadratic equation:
                    <span class="step-math">${formatPolynomial([{coeff: 1, var: 'x<sup>2</sup>'}, {coeff: -(r1+r2), var: 'x'}, {coeff: r1*r2, var: ''}])} = 0</span>
                </div>
                ${formatQuadSteps(1, -(r1+r2), r1*r2, r1, r2)}
            `;
        } else {
            let x1, x2, c, d, e, f, y1n, y1d, y2n, y2d, A, B, K;
            while(true) {
                x1 = getRandomInt(-5, 5); x2 = getRandomInt(-5, 5);
                if(x1 === x2) continue;
                c = getRandomInt(1, 3); d = getRandomInt(-4, 4, true);
                e = getRandomInt(1, 3); f = getRandomInt(-4, 4, true);
                if (c*f - d*e === 0) continue; 
                let den1 = e*x1 + f; let den2 = e*x2 + f;
                let num1 = c*x1 + d; let num2 = c*x2 + d;
                if (den1 === 0 || den2 === 0 || num1 === 0 || num2 === 0) continue;
                
                let f1 = simplifyFraction(num1, den1); y1n = f1[0]; y1d = f1[1];
                let f2 = simplifyFraction(num2, den2); y2n = f2[0]; y2d = f2[1];
                
                A = Math.abs(y1d * y2d);
                let mult = A / (y1d * y2d); 
                B = mult * y1n * y2n;
                K = mult * (y1n * y2d + y2n * y1d);
                
                if (Math.abs(A) > 10 || Math.abs(B) > 15 || Math.abs(K) > 30) continue;
                if (A === 0 || B === 0) continue;
                break;
            }
            
            currentProblem = { type: 'quad', ansX1: x1, ansX2: x2 };
            
            let term1 = buildFraction(formatLinearBinomial(c, 'x', d), formatLinearBinomial(e, 'x', f));
            let term2 = buildFraction(formatLinearBinomial(e, 'x', f), formatLinearBinomial(c, 'x', d));
            let pL = `<span class="large-paren">(</span>`; let pR = `<span class="large-paren">)</span>`;
            
            document.getElementById('equation-display').innerHTML = `<div class="equation">${A === 1 ? '' : A}${pL}${term1}${pR} ${B < 0 ? '-' : '+'} ${Math.abs(B)}${pL}${term2}${pR} = ${K}</div>`;
            let subFraction = buildFraction(formatLinearBinomial(c, 'x', d), formatLinearBinomial(e, 'x', f));

            stepsHTML = `
                <div class="step"><b>Phase 1: Substitution</b><br>
                    Notice that the two fractions are reciprocals. Let <i>y</i> = ${subFraction}.<br>
                    The equation becomes: <span class="step-math">${A === 1 ? '' : A}<i>y</i> ${B < 0 ? '-' : '+'} ${buildFraction(Math.abs(B), '<i>y</i>')} = ${K}</span>
                </div>
                <div class="step">Multiply by <i>y</i> to clear the fraction and rearrange to standard quadratic form:
                    <span class="step-math">${formatPolynomial([{coeff: A, var: 'y<sup>2</sup>'}, {coeff: -K, var: 'y'}, {coeff: B, var: ''}])} = 0</span>
                </div>
                <div class="step"><b>Phase 2: Solve for <i>y</i></b><br>
                    Solving this quadratic equation gives:
                    <span class="step-math"><i>y</i> = ${y1d === 1 ? y1n : buildFraction(y1n, y1d)} &nbsp;&nbsp;&nbsp; or &nbsp;&nbsp;&nbsp; <i>y</i> = ${y2d === 1 ? y2n : buildFraction(y2n, y2d)}</span>
                </div>
                <div class="step"><b>Phase 3: Back-Substitute to solve for <i>x</i></b><br>
                    <b>For <i>y</i> = ${y1d === 1 ? y1n : buildFraction(y1n, y1d)}:</b>
                    <span class="step-math">${subFraction} = ${y1d === 1 ? y1n : buildFraction(y1n, y1d)}</span>
                    Cross-multiply and solve: <span class="step-math" style="color: var(--success);"><i>x</i> = ${x1}</span><br>
                    <b>For <i>y</i> = ${y2d === 1 ? y2n : buildFraction(y2n, y2d)}:</b>
                    <span class="step-math">${subFraction} = ${y2d === 1 ? y2n : buildFraction(y2n, y2d)}</span>
                    Cross-multiply and solve: <span class="step-math" style="color: var(--success);"><i>x</i> = ${x2}</span>
                </div>
            `;
        }
        document.getElementById('solution-steps').innerHTML = stepsHTML;
    }

    window.onload = () => {
        // Fallback explicit set on load to prevent blank problems
        document.getElementById('difficulty-level').innerHTML = `
            <option value="standard">Standard Level</option>
            <option value="brackets">Standard Level (Brackets)</option>
            <option value="intermediate">Intermediate Level</option>
            <option value="advanced">Advanced Level</option>
            <option value="mastery">Mastery Level</option>
        `;
        document.getElementById('difficulty-level').selectedIndex = 0;
        switchMode('single');
    };
</script>
